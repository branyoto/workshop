name: Validate CMS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-cms:
    name: Validate CMS content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - run: npm install -g corepack
      - run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: corepack enable

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Validate cms.json and image thumbnails
        run: yarn validate:cms

      - name: Purge jsDelivr cache
        if: success()
        run: |
          set -euo pipefail
          url="https://purge.jsdelivr.net/gh/branyoto/workshop@main/public/cms.json"
          response="$(curl --fail-with-body -sS "$url")"
          echo "$response"
          echo "$response" | node -e "
            const input = require('fs').readFileSync(0, 'utf8');
            const payload = JSON.parse(input);
            if (payload.status !== 'finished') {
              console.error('::error::jsDelivr purge did not finish successfully');
              process.exit(1);
            }
          "
